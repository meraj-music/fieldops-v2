version: '3.8'

services:
  # ---------------------------------------------------------
  # 1. DATABASE SERVICE
  # ---------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: fieldops_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: fieldops_v2
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d 

  # ---------------------------------------------------------
  # 2. AUTHENTICATION SERVICE
  # ---------------------------------------------------------
  auth-service:
    build: ./auth-service
    container_name: fieldops_auth
    ports:
      - "5001:5000"
    environment:
      - DATABASE_URL=postgres://admin:password123@db:5432/fieldops_v2
      - JWT_SECRET=fieldnation_internship_secret_key
      - PORT=5000
    depends_on:
      - db
    volumes:
      - ./auth-service:/app
      - /app/node_modules

  # ---------------------------------------------------------
  # 3. INITIATIVE SERVICE
  # ---------------------------------------------------------
  initiative-service:
    build: ./initiative-service
    container_name: fieldops_initiative
    ports:
      - "5002:5000"
    environment:
      - DATABASE_URL=postgres://admin:password123@db:5432/fieldops_v2
      - PORT=5000
    depends_on:
      - db
    volumes:
      - ./initiative-service:/app
      - /app/node_modules

  # ---------------------------------------------------------
  # 4. CAMPAIGN SERVICE
  # ---------------------------------------------------------
  campaign-service:
    build: ./campaign-service
    container_name: fieldops_campaign
    ports:
      - "5003:5000"
    environment:
      - DATABASE_URL=postgres://admin:password123@db:5432/fieldops_v2
      - PORT=5000
    depends_on:
      - db
    volumes:
      - ./campaign-service:/app
      - /app/node_modules

  # ---------------------------------------------------------
  # 5. FRONTEND (REACT / VITE)
  # ---------------------------------------------------------
  frontend:
    build: ./frontend
    container_name: fieldops_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_AUTH_API_URL=http://localhost:5001
      - VITE_INITIATIVE_API_URL=http://localhost:5002
      - VITE_CAMPAIGN_API_URL=http://localhost:5003
    depends_on:
      - auth-service
      - initiative-service
      - campaign-service
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata: